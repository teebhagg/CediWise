# Build Android AAB via EAS *local* build and submit to Google Play (runner runs Docker).
# Cloud `eas build` + auto-submit is commented below — re-enable when you prefer Expo cloud builds.
# Required secrets: EXPO_TOKEN, GOOGLE_SERVICE_KEY, EXPO_PUBLIC_SUPABASE_URL,
#   EXPO_PUBLIC_SUPABASE_KEY, EXPO_PUBLIC_SUPABASE_ANON_KEY, FIREBASE_PROJECT_ID, SENTRY_AUTH_TOKEN
# Trigger: push to main, push tag v*, or manual workflow_dispatch.
name: Build Android & Deploy to Play Store

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.0.1). Uses app.json if empty."
        required: false

env:
  MOBILE_APP_DIR: cediwise-mobile-app

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
      requires_update: ${{ steps.update-policy.outputs.requires_update }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from app.json
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(jq -r '.expo.version' ${{ env.MOBILE_APP_DIR }}/app.json)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Validate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="${{ env.MOBILE_APP_DIR }}/distribution/${VERSION}.txt"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file missing: $NOTES_FILE"
            exit 1
          fi
          CHAR_COUNT=$(wc -c < "$NOTES_FILE" | tr -d ' ')
          if [ "$CHAR_COUNT" -gt 500 ]; then
            echo "::error::Release notes exceed 500 characters ($CHAR_COUNT). Max 500 allowed."
            exit 1
          fi
          echo "Release notes validated ($CHAR_COUNT chars)"

      - name: Determine should_build
        id: check
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_COMMIT_MSG" | grep -Eiq '\[skip-deploy\]'; then
            echo "Found [skip-deploy] in commit message. Skipping deploy."
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            LATEST_TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "v0.0.0")
            LATEST_VER="${LATEST_TAG#v}"
            if [ "$(printf '%s\n' "$LATEST_VER" "$VERSION" | sort -V | tail -1)" = "$VERSION" ] && [ "$LATEST_VER" != "$VERSION" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine requires_update from commit indicators
        id: update-policy
        run: |
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | sed -n '1p')
          RANGE=""
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD~20..HEAD"
          fi

          COMMITS=$(git log --format="%s%n%b%n---" $RANGE 2>/dev/null || git log --format="%s%n%b%n---")

          export COMMITS
          python - <<'PY'
          import os
          import re

          commits = os.environ.get("COMMITS", "")
          mandatory_patterns = [
              r"\bBREAKING CHANGE\b",
              r"(?m)^[a-z]+(?:\([^)]+\))?!:",
              r"\[force-update\]",
          ]
          requires_update = any(
              re.search(pattern, commits, flags=re.IGNORECASE) is not None
              for pattern in mandatory_patterns
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"requires_update={'true' if requires_update else 'false'}\n")
          PY

  build-and-submit:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.MOBILE_APP_DIR }}/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npm ci

      - name: Write Google Service Account key
        run: echo '${{ secrets.GOOGLE_SERVICE_KEY }}' > /tmp/google-service-account-key.json

      - name: Inject secrets into eas.json
        working-directory: ${{ env.MOBILE_APP_DIR }}
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          EXPO_PUBLIC_POSTHOG_API_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_API_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

        run: |
          node -e "
          const fs = require('fs');
          const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
          eas.build = eas.build || {};
          eas.build.production = eas.build.production || {};
          eas.build.production.env = {
            EXPO_PUBLIC_SUPABASE_URL: process.env.EXPO_PUBLIC_SUPABASE_URL,
            EXPO_PUBLIC_SUPABASE_KEY: process.env.EXPO_PUBLIC_SUPABASE_KEY,
            EXPO_PUBLIC_SUPABASE_ANON_KEY: process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY,
            FIREBASE_PROJECT_ID: process.env.FIREBASE_PROJECT_ID,
            EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY: process.env.EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY,
            EXPO_PUBLIC_POSTHOG_API_KEY: process.env.EXPO_PUBLIC_POSTHOG_API_KEY,
            EXPO_PUBLIC_POSTHOG_HOST: process.env.EXPO_PUBLIC_POSTHOG_HOST,
            SENTRY_AUTH_TOKEN: process.env.SENTRY_AUTH_TOKEN,
          };
          eas.submit = eas.submit || {};
          eas.submit.production = eas.submit.production || {};
          eas.submit.production.android = { ...eas.submit.production.android, serviceAccountKeyPath: '/tmp/google-service-account-key.json' };
          fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
          "

      # Expo cloud build + Play submission (disabled — use local build below).
      # - name: Build and auto-submit Android
      #   working-directory: ${{ env.MOBILE_APP_DIR }}
      #   run: eas build --platform android --profile production --auto-submit --non-interactive
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # --- Local EAS build + submit (no cloud credits; Docker on runner) ---
      - name: Build Android AAB (Play Store, local)
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npm run build:android:aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          EXPO_PUBLIC_POSTHOG_API_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_API_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Submit to Google Play Store (local artifact)
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: eas submit --path "dist/CediWise-${{ needs.check-version.outputs.version }}.aab" --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # - name: Create GitHub Release
      #   run: |
      #     VERSION="${{ needs.check-version.outputs.version }}"
      #     cp ${{ env.MOBILE_APP_DIR }}/distribution/${VERSION}.txt /tmp/release_notes.txt
      #     gh release create "v${VERSION}" \
      #       --title "v${VERSION}" \
      #       --notes-file /tmp/release_notes.txt \
      #       --repo ${{ github.repository }}
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update app_versions (android)
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          REQUIRES_UPDATE="${{ needs.check-version.outputs.requires_update }}"
          SUPABASE_URL="${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}"
          SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          NOTES_FILE="${{ env.MOBILE_APP_DIR }}/distribution/${VERSION}.txt"

          if [ -z "$SUPABASE_URL" ] || [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::warning::Skipping app_versions update - SUPABASE_PUBLIC_URL or SUPABASE_SERVICE_ROLE_KEY not set"
            exit 0
          fi

          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file missing for app_versions payload: $NOTES_FILE"
            exit 1
          fi

          RELEASE_NOTES=$(cat "$NOTES_FILE")

          echo "Deactivating previous android app_versions rows..."
          curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/app_versions?platform=eq.android" \
            -H "apikey: ${SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"is_active": false}' || {
              echo "::warning::Failed to deactivate previous android app_versions rows"
            }

          echo "Inserting new active android app_version ${VERSION} (requires_update=${REQUIRES_UPDATE})..."
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg releaseNotes "$RELEASE_NOTES" \
            --argjson requiresUpdate "$REQUIRES_UPDATE" \
            '{platform: "android", version: $version, is_active: true, release_notes: $releaseNotes, requires_update: $requiresUpdate}')

          curl -sS -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$PAYLOAD" || {
              echo "::warning::Insert with release metadata failed; retrying with minimal payload"
              curl -sS -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
                -H "apikey: ${SERVICE_ROLE_KEY}" \
                -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"platform\": \"android\", \"version\": \"${VERSION}\", \"is_active\": true}" || {
                  echo "::error::Failed to insert new android app_version row"
                  exit 1
                }
            }

      - name: Delete build artifacts
        if: success()
        run: |
          rm -rf ${{ env.MOBILE_APP_DIR }}/dist
          rm -f /tmp/google-service-account-key.json
