# Run mobile app lint and typecheck on every PR; comment result on the PR.
name: Mobile app PR check

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]
    paths:
      - "cediwise-mobile-app/**"
      - ".github/workflows/mobile-app-pr-check.yml"

env:
  MOBILE_APP_DIR: cediwise-mobile-app

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.MOBILE_APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npm run lint

      - name: Typecheck
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npx tsc --noEmit

  comment:
    needs: check
    if: always() && github.event_name == 'pull_request' && (needs.check.result == 'success' || needs.check.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.check.result }}';
            const body = result === 'success'
              ? '✅ **Mobile app check passed.** Safe to merge.'
              : '❌ **Mobile app check failed.** See the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
