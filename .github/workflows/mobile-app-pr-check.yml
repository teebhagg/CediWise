# Run mobile app lint and typecheck on every PR; comment result on the PR.
# ESLint: only errors fail the job (--max-warnings -1). Warnings are reported in the PR comment only.
name: Mobile app PR check

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]
    paths:
      - "cediwise-mobile-app/**"
      - ".github/workflows/mobile-app-pr-check.yml"

env:
  MOBILE_APP_DIR: cediwise-mobile-app

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      error_count: ${{ steps.eslint.outputs.error_count }}
      warning_count: ${{ steps.eslint.outputs.warning_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.MOBILE_APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npm ci

      - name: Lint (errors fail; warnings do not)
        id: eslint
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: |
          set +e
          npm run lint -- --max-warnings -1 2>&1 | tee eslint.log
          lint_exit=$?
          set -e
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("fs");
          const log = fs.readFileSync("eslint.log", "utf8");
          const re = /✖\s+\d+\s+problems\s+\((\d+)\s+errors,\s+(\d+)\s+warnings\)/g;
          const matches = [...log.matchAll(re)];
          const m = matches.length ? matches[matches.length - 1] : null;
          const err = m ? m[1] : "0";
          const warn = m ? m[2] : "0";
          process.stdout.write(`error_count=${err}\nwarning_count=${warn}\n`);
          NODE
          exit "$lint_exit"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.MOBILE_APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npm ci

      - name: Typecheck
        working-directory: ${{ env.MOBILE_APP_DIR }}
        run: npx tsc --noEmit

  comment:
    needs: [lint, typecheck]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const lint = '${{ needs.lint.result }}';
            const tsc = '${{ needs.typecheck.result }}';
            const errCount = Number('${{ needs.lint.outputs.error_count }}' || '0');
            const warnCount = Number('${{ needs.lint.outputs.warning_count }}' || '0');

            let body;
            if (lint === 'success' && tsc === 'success') {
              if (warnCount > 0) {
                body =
                  `⚠️ **Mobile app checks passed** (lint + typecheck), but ESLint reported **${warnCount} warning(s)** and **0 errors**. ` +
                  `Safe to merge; consider cleaning warnings over time. [Workflow run](${runUrl})`;
              } else {
                body =
                  `✅ **Mobile app checks passed** (lint + typecheck). No ESLint errors or warnings in the summary. Safe to merge. [Workflow run](${runUrl})`;
              }
            } else {
              const parts = [];
              if (lint === 'failure') {
                const errLabel =
                  errCount > 0 ? `${errCount} error(s)` : 'one or more errors';
                parts.push(
                  `❌ **ESLint: ${errLabel}** (warnings alone do not fail CI). Fix errors before merging. [Workflow run](${runUrl})`,
                );
              } else if (lint !== 'success') {
                parts.push(
                  `❌ **Lint job did not succeed** (${lint}). [Workflow run](${runUrl})`,
                );
              } else if (warnCount > 0) {
                parts.push(
                  `⚠️ ESLint: **${warnCount} warning(s)**, **0 errors** (warnings do not fail CI).`,
                );
              }
              if (tsc === 'failure') {
                parts.push(
                  `❌ **TypeScript errors** (\`tsc --noEmit\`). Fix type errors before merging. [Workflow run](${runUrl})`,
                );
              } else if (tsc !== 'success') {
                parts.push(
                  `❌ **Typecheck job did not succeed** (${tsc}). [Workflow run](${runUrl})`,
                );
              }
              body = parts.join('\n\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
